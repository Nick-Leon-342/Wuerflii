

name: wuerflii

services:
  frontend:
    container_name: wuerflii-frontend
    image: nickleon/wuerflii-frontend:v_3.0.2
    restart: unless-stopped
    ports:
      - 10000:80
    depends_on:
      postgresql:
        condition: service_healthy

  backend:
    container_name: wuerflii-backend
    image: nickleon/wuerflii-backend:v_3.0.1
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./avatars:/app/avatars
    depends_on:
      postgresql:
        condition: service_healthy

  redis:
    container_name: wuerflii-redis
    image: redis:latest
    command: >
      --requirepass ${REDIS__PASSWORD}
      --appendonly yes
    restart: unless-stopped

  postgresql:
    image: postgres:18
    container_name: wuerflii-postgresql
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      PGUSER: ${POSTGRES_USER}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - 20000:5432
    restart: unless-stopped
    volumes:
      - ./postgresql:/var/lib/postgresql/
#      - ./wuerflii-latest.sql:/docker-entrypoint-initdb.d/init.sql

  postgres-backup:
    image: prodrigestivill/postgres-backup-local
    container_name: wuerflii-postgresql-backup
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE: "0 * * * *"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      BACKUP_FILENAME: "wuerflii_%Y-%m-%d_%H.sql.gz"
    restart: unless-stopped
    volumes:
      - ./postgresql_backups:/backups